name: Build & Publish Docker Image

# Builds a multi-arch image and pushes it to both GitHub Container Registry
# (GHCR) and Docker Hub. Docker Hub steps are skipped automatically if the
# DOCKERHUB_USERNAME repository variable is not configured (e.g. on forks).
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  # GHCR image: ghcr.io/<owner>/<repo> (always lowercase)
  GHCR_IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # required to push to GHCR via GITHUB_TOKEN

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # --- Registry logins ---------------------------------------------------
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # --- Tag/label metadata (one per registry) -----------------------------
      - name: Extract metadata (Docker Hub)
        id: meta-dockerhub
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/metadata-action@v6
        with:
          images: docker.io/${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Extract metadata (GHCR)
        id: meta-ghcr
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      # --- Build & push ------------------------------------------------------
      # Push to each registry separately. Both reuse the GHA build cache, so the
      # multi-arch build runs once and the second push reuses cached layers.
      # The Docker Hub step is gated on DOCKERHUB_USERNAME so forks skip it.
      - name: Build and push to Docker Hub
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-dockerhub.outputs.tags }}
          labels: ${{ steps.meta-dockerhub.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push to GHCR
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-ghcr.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          cache-from: type=gha
