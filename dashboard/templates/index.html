<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Aggregator Dashboard</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3e;
      --text: #e2e8f0; --muted: #718096; --accent: #6366f1;
      --green: #10b981; --red: #ef4444; --yellow: #f59e0b;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px;
             display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 16px; font-weight: 600; }
    .badge { background: var(--accent); color: white; font-size: 11px; padding: 2px 8px; border-radius: 999px; }
    .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--green);
             animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .nav-links { margin-left: auto; display: flex; gap: 16px; font-size: 13px; }
    .nav-links a { color: var(--muted); text-decoration: none; padding: 4px 10px; border-radius: 6px; transition: all .15s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); background: var(--border); }

    .layout { display: grid; grid-template-columns: 260px 1fr; height: calc(100vh - 49px); }
    .sidebar { background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; }
    .main { overflow-y: auto; padding: 20px; }

    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
    .stat-card .label { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    .stat-card .value { font-size: 28px; font-weight: 700; }
    .stat-card .sub { color: var(--muted); font-size: 11px; margin-top: 4px; }

    .section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase;
                     letter-spacing: 0.05em; margin-bottom: 12px; }
    .article-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
                    padding: 14px; margin-bottom: 10px; transition: border-color 0.2s; }
    .article-card:hover { border-color: var(--accent); }
    .article-card.synthetic-card { 
      background: linear-gradient(135deg, rgba(99,102,241,0.05) 0%, rgba(129,140,248,0.03) 100%);
      border-left: 3px solid var(--accent);
    }
    .article-card.synthetic-card:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(99,102,241,0.15); }
    .article-card .meta { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
    .article-card .source { font-size: 11px; color: var(--accent); font-weight: 600; }
    .article-card .lang { font-size: 10px; background: var(--border); padding: 1px 6px; border-radius: 3px; color: var(--muted); }
    .article-card .time { font-size: 11px; color: var(--muted); margin-left: auto; }
    .article-card .title { font-size: 14px; font-weight: 500; line-height: 1.4; margin-bottom: 8px; }
    .article-card .title a { color: var(--text); text-decoration: none; }
    .article-card .title a:hover { color: var(--accent); }
    .article-card.synthetic-card .title a { color: var(--accent); }
    .article-card .ai-badge { font-size: 10px; padding: 1px 6px; border-radius: 3px; }
    .ai-done { background: rgba(16,185,129,0.15); color: var(--green); }
    .ai-pending { background: rgba(245,158,11,0.15); color: var(--yellow); }
    .summary { font-size: 12px; color: var(--muted); line-height: 1.5; margin-top: 6px;
               border-left: 2px solid var(--border); padding-left: 8px; }

    .sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }
    .sidebar-section h3 { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase;
                           letter-spacing: 0.05em; margin-bottom: 10px; }
    .source-row { display: flex; justify-content: space-between; align-items: center;
                  padding: 4px 0; font-size: 12px; }
    .source-row .name { color: var(--text); }
    .source-row .cnt { color: var(--accent); font-weight: 600; font-size: 11px; }
    .bar { background: var(--border); border-radius: 2px; height: 4px; margin-top: 2px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

    /* Filter bar */
    .filter-bar { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; align-items: center; }
    .filter-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em;
                    margin-right: 4px; font-weight: 600; min-width: 64px; }
    .filter-chip {
      background: var(--surface); border: 1px solid var(--border); color: var(--muted);
      padding: 5px 12px; border-radius: 999px; font-size: 12px; cursor: pointer; transition: all .15s;
      white-space: nowrap;
    }
    .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
    .filter-chip.active { background: var(--accent); border-color: var(--accent); color: white; }
    .filter-active {
      font-size: 12px; color: var(--muted); margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .filter-clear {
      background: transparent; border: 1px solid var(--border); color: var(--red);
      padding: 2px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; transition: all .15s;
    }
    .filter-clear:hover { background: var(--red); color: white; border-color: var(--red); }
    .source-link { cursor: pointer; }
    .source-link:hover { text-decoration: underline; }
    .cat-badge { font-size: 10px; background: rgba(99,102,241,0.12); padding: 1px 6px; border-radius: 3px;
                 color: var(--accent); cursor: pointer; }
    .cat-badge:hover { background: rgba(99,102,241,0.25); }

    /* Pagination */
    .pagination { display: flex; align-items: center; justify-content: center; gap: 4px; margin-top: 16px; padding: 8px 0; }
    .pagination .info { font-size: 12px; color: var(--muted); margin-right: 12px; }
    .pagination button, .pagination .page-btn {
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: all .15s;
    }
    .pagination button:hover, .pagination .page-btn:hover { border-color: var(--accent); color: var(--accent); }
    .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }
    .pagination button:disabled:hover { border-color: var(--border); color: var(--text); }
    .pagination .page-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
    .pagination .ellipsis { color: var(--muted); padding: 0 4px; font-size: 12px; }

    .htmx-indicator { opacity: 0.4; }
  </style>
</head>
<body>
  <header>
    <div class="pulse"></div>
    <h1>News Aggregator</h1>
    <span class="badge">LIVE</span>
    <nav class="nav-links">
      <a href="/" class="active">Feed</a>
      <a href="/pipeline">Pipeline</a>
      <a href="/intelligence">Intelligence</a>
      <a href="/newsletter">Newsletter</a>
      <a href="/sources">Sources</a>
      <a href="/settings">Settings</a>
      <a href="/logs">Logs</a>
    </nav>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-section"
           hx-get="/partials/stats"
           hx-trigger="load, every 30s"
           hx-target="this"
           hx-swap="innerHTML">
        <p style="color:var(--muted);font-size:12px;">Loading stats...</p>
      </div>
    </aside>

    <main class="main">
      <p class="section-title">Latest Articles</p>
      <div id="feed"
           hx-get="/partials/feed?page=1"
           hx-trigger="load"
           hx-swap="innerHTML"
           hx-indicator="#feed-spinner">
        <p style="color:var(--muted)">Loading feed...</p>
      </div>
      <div id="feed-spinner" class="htmx-indicator" style="text-align:center;padding:12px;color:var(--muted)">
        Refreshing...
      </div>
    </main>
  </div>
</body>
</html>
