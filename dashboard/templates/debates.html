<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debates — News Aggregator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3e;
      --text: #e2e8f0; --muted: #718096; --accent: #6366f1;
      --green: #10b981; --red: #ef4444; --yellow: #f59e0b; --orange: #f97316;
      --purple: #a855f7; --teal: #14b8a6;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; }
    a { color: var(--accent); text-decoration: none; }


    .page { padding: 24px; max-width: 900px; margin: 0 auto; }
    .page-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .page-sub { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

    /* Debate card */
    .debate-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .debate-meta {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px;
    }
    .badge {
      font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .badge-debate { background: rgba(168,85,247,0.15); color: #c084fc; }
    .badge-cat { background: rgba(99,102,241,0.15); color: var(--accent); }
    .badge-model { background: rgba(20,184,166,0.1); color: var(--teal); font-weight: 400; text-transform: none; letter-spacing: 0; }
    .debate-time { font-size: 12px; color: var(--muted); margin-left: auto; }

    .debate-headline {
      font-size: 16px; font-weight: 700; line-height: 1.4; margin-bottom: 16px; color: var(--text);
    }

    /* Synthesis block — always visible */
    .synthesis-block {
      background: rgba(99,102,241,0.06);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 14px 16px;
      margin-bottom: 14px;
      font-size: 13px;
      line-height: 1.7;
      color: #cbd5e1;
    }
    .synthesis-label {
      font-size: 10px; font-weight: 700; color: var(--accent); text-transform: uppercase;
      letter-spacing: 0.08em; margin-bottom: 8px;
    }

    /* Collapsible agent sections */
    .agents-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .agent-btn {
      background: var(--border); border: none; color: var(--muted);
      font-size: 12px; font-weight: 500; padding: 5px 12px; border-radius: 6px;
      cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 5px;
    }
    .agent-btn:hover { color: var(--text); background: #353849; }
    .agent-btn.active { color: var(--text); background: #353849; }
    .agent-btn .dot { width: 6px; height: 6px; border-radius: 50%; }
    .dot-factual { background: var(--green); }
    .dot-skeptic { background: var(--red); }
    .dot-impact  { background: var(--orange); }

    .agent-panel {
      display: none; margin-top: 12px; padding: 12px 14px;
      background: #13151f; border: 1px solid var(--border); border-radius: 8px;
      font-size: 13px; line-height: 1.7; color: #94a3b8;
      white-space: pre-wrap;
    }
    .agent-panel.open { display: block; }
    .agent-panel-label {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .label-factual { color: var(--green); }
    .label-skeptic { color: var(--red); }
    .label-impact  { color: var(--orange); }

    /* Empty / loading states */
    .state-box {
      text-align: center; padding: 60px 24px; color: var(--muted); font-size: 14px;
    }
    .state-box .icon { font-size: 32px; margin-bottom: 12px; opacity: 0.5; }
    .spinner {
      width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

{% include 'partials/header.html' %}

<div class="page">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px">
    <div>
      <div class="page-title">Multi-Agent Debates</div>
      <div class="page-sub" style="margin-bottom:0">Each story is analyzed by Factual, Skeptic, and Impact agents — then synthesized.</div>
    </div>
    <button id="run-btn" onclick="runDebates()" style="
      background:#6366f1;border:none;color:#fff;font-size:13px;font-weight:600;
      padding:8px 16px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:6px;
      transition:background .15s;white-space:nowrap">
      ▶ Run Now
    </button>
  </div>
  <div id="run-status" style="display:none;margin-bottom:16px;padding:10px 14px;border-radius:8px;font-size:13px"></div>

  <div id="debates-container">
    <div class="state-box">
      <div class="spinner"></div>
      Loading debates…
    </div>
  </div>
</div>

<script>
async function loadDebates() {
  const container = document.getElementById('debates-container');
  try {
    const resp = await fetch('/api/intelligence/debates?limit=20');
    const data = await resp.json();

    if (!data.debates || data.debates.length === 0) {
      container.innerHTML = `
        <div class="state-box">
          <div class="icon">🤔</div>
          No debates yet — debates run automatically when a story has 3+ articles.<br>
          Make sure <code>debate.enabled: true</code> in settings.yaml.
        </div>`;
      return;
    }

    container.innerHTML = data.debates.map((d, i) => buildCard(d, i)).join('');
  } catch (err) {
    container.innerHTML = `<div class="state-box"><div class="icon">⚠</div>Failed to load debates: ${err.message}</div>`;
  }
}

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function buildCard(d, i) {
  const cat = d.category || d.story_id?.split('_')[0] || '';
  const model = d.model || '';
  const time = fmtTime(d.generated_at);
  const headline = d.story_headline || `Story ${d.story_id}`;

  return `
    <div class="debate-card">
      <div class="debate-meta">
        <span class="badge badge-debate">⚡ Debate</span>
        ${cat ? `<span class="badge badge-cat">${cat}</span>` : ''}
        ${model ? `<span class="badge badge-model">${model}</span>` : ''}
        <span class="debate-time">${time}</span>
      </div>
      <div class="debate-headline">${escHtml(headline)}</div>

      <div class="synthesis-block">
        <div class="synthesis-label">Synthesis</div>
        ${escHtml(d.synthesis || '—')}
      </div>

      <div class="agents-row">
        <button class="agent-btn" onclick="togglePanel(this, 'factual-${i}')">
          <span class="dot dot-factual"></span> Factual
        </button>
        <button class="agent-btn" onclick="togglePanel(this, 'skeptic-${i}')">
          <span class="dot dot-skeptic"></span> Skeptic
        </button>
        <button class="agent-btn" onclick="togglePanel(this, 'impact-${i}')">
          <span class="dot dot-impact"></span> Impact
        </button>
      </div>

      <div class="agent-panel" id="factual-${i}">
        <div class="agent-panel-label label-factual">Factual Analysis</div>
        ${escHtml(d.factual || '—')}
      </div>
      <div class="agent-panel" id="skeptic-${i}">
        <div class="agent-panel-label label-skeptic">Skeptic Analysis</div>
        ${escHtml(d.skeptic || '—')}
      </div>
      <div class="agent-panel" id="impact-${i}">
        <div class="agent-panel-label label-impact">Impact Analysis</div>
        ${escHtml(d.impact || '—')}
      </div>
    </div>`;
}

function togglePanel(btn, id) {
  const panel = document.getElementById(id);
  const isOpen = panel.classList.toggle('open');
  btn.classList.toggle('active', isOpen);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}

async function runDebates() {
  const btn = document.getElementById('run-btn');
  const status = document.getElementById('run-status');
  btn.disabled = true;
  btn.textContent = '⏳ Running…';
  status.style.display = 'none';
  try {
    const resp = await fetch('/api/intelligence/debates/run', { method: 'POST' });
    const data = await resp.json();
    if (!resp.ok) {
      status.style.cssText = 'display:block;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;padding:10px 14px;border-radius:8px;font-size:13px';
      status.textContent = '✗ ' + (data.detail || 'Failed');
    } else {
      status.style.cssText = 'display:block;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#6ee7b7;padding:10px 14px;border-radius:8px;font-size:13px';
      status.textContent = `✓ Done — ${data.debated} debate(s) generated`;
      if (data.debated > 0) setTimeout(loadDebates, 500);
    }
  } catch (err) {
    status.style.cssText = 'display:block;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;padding:10px 14px;border-radius:8px;font-size:13px';
    status.textContent = '✗ ' + err.message;
  } finally {
    btn.disabled = false;
    btn.textContent = '▶ Run Now';
  }
}

loadDebates();
</script>
</body>
</html>
