<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · News Aggregator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3e;
      --text: #e2e8f0; --muted: #718096; --accent: #6366f1; --red: #ef4444;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif;
           font-size: 14px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
            padding: 32px; width: 100%; max-width: 400px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 24px; }
    label { display: block; color: var(--muted); font-size: 12px; margin-bottom: 6px;
            text-transform: uppercase; letter-spacing: 0.05em; }
    input { width: 100%; background: var(--bg); border: 1px solid var(--border);
            color: var(--text); padding: 10px 12px; border-radius: 6px; font-size: 14px;
            font-family: inherit; margin-bottom: 16px; }
    input:focus { outline: none; border-color: var(--accent); }
    button { width: 100%; background: var(--accent); color: white; border: none;
             padding: 11px 16px; border-radius: 6px; font-size: 14px; font-weight: 500;
             font-family: inherit; cursor: pointer; transition: opacity 0.15s; }
    button:hover { opacity: 0.9; }
    .error { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--red);
             color: var(--red); padding: 10px 12px; border-radius: 6px;
             font-size: 13px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <form class="card" method="post" action="/login">
    <h1>News Aggregator</h1>
    <p class="subtitle">Sign in to continue</p>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <input type="hidden" name="next" value="{{ next }}">
    <label for="username">Username</label>
    <input id="username" name="username" type="text" autocomplete="username" autofocus required value="{{ username }}">
    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>
    <button type="submit">Sign in</button>
  </form>
</body>
</html>
