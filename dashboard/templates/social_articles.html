<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Article Generator — News Aggregator</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3e;
      --text: #e2e8f0; --muted: #718096; --accent: #6366f1;
      --green: #10b981; --red: #ef4444; --yellow: #f59e0b;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .header h1 { font-size: 24px; font-weight: 700; }
    
    .grid-2 { display: grid; grid-template-columns: 380px 1fr; gap: 20px; transition: grid-template-columns 0.3s ease; }
    .grid-2.collapsed { grid-template-columns: 0fr 1fr; gap: 0; }
    .grid-2.collapsed > .panel:first-child { 
      overflow: hidden; 
      opacity: 0; 
      width: 0; 
      min-width: 0; 
      padding: 0; 
      border: none; 
    }
    
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
    .panel h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .form-group label { font-size: 12px; color: var(--muted); font-weight: 600; }
    .form-group input, .form-group select, .form-group textarea {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      padding: 8px 12px; border-radius: 6px; font-size: 13px; outline: none;
      font-family: inherit;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: var(--accent);
    }
    
    .btn { padding: 10px 20px; border-radius: 6px; font-size: 14px; font-weight: 500;
           cursor: pointer; border: none; transition: all .15s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-outline { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }
    .btn-outline:hover { background: rgba(99,102,241,0.08); }
    
    .article-card { background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
                    padding: 16px; margin-bottom: 12px; transition: border-color .15s; }
    .article-card:hover { border-color: var(--accent); }
    .article-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .article-meta { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
    .article-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .tag { background: var(--border); color: var(--text); padding: 2px 8px; border-radius: 4px;
           font-size: 10px; font-weight: 600; }
    
    .section-box { background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
                   padding: 14px; margin-bottom: 12px; }
    .section-heading { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
    .section-content { font-size: 12px; line-height: 1.6; color: var(--muted); margin-bottom: 8px; }
    .image-prompt { background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
                    padding: 8px; font-family: monospace; font-size: 11px; color: var(--accent); }
    
    .alert { padding: 12px 16px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; }
    .alert-success { background: rgba(16,185,129,0.12); color: var(--green); border: 1px solid rgba(16,185,129,0.25); }
    .alert-error { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.25); }
    .alert-info { background: rgba(99,102,241,0.12); color: var(--accent); border: 1px solid rgba(99,102,241,0.25); }
    
    .loading { text-align: center; padding: 40px; color: var(--muted); }
    .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border);
               border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .empty-state { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  {% include 'partials/header.html' %}

  <div class="container">
    <div class="header">
      <h1>✍️ Social Article Generator</h1>
      <a href="/settings" class="btn btn-outline">← Back to Settings</a>
    </div>

    <div class="grid-2">
      <!-- Generator Panel -->
      <div class="panel">
        <h2>Generate New Article</h2>
        
        <form id="generate-form">
          <div class="form-group">
            <label>AI Provider</label>
            <select id="provider-id" name="provider_id">
              <option value="">— Use default from settings —</option>
              <!-- Populated via JS -->
            </select>
          </div>
          
          <div class="form-group">
            <label>Categories <span style="font-size:10px;color:var(--muted)">(hold Ctrl/Cmd to select multiple)</span></label>
            <select id="categories" name="categories" multiple style="min-height:120px">
              <!-- Populated via JS -->
            </select>
          </div>
          
          <div class="form-group">
            <label>Style Preset</label>
            <select id="style-preset" name="style_preset">
              <!-- Populated via JS -->
            </select>
          </div>
          
          <div class="form-group">
            <label>Time Range (hours)</label>
            <input type="number" id="hours" name="hours" value="24" min="1" max="168">
          </div>
          
          <div class="form-group">
            <label>Min Articles</label>
            <input type="number" id="min-articles" name="min_articles" value="3" min="1" max="50">
          </div>
          
          <div class="form-group">
            <label>Max Articles</label>
            <input type="number" id="max-articles" name="max_articles" value="20" min="1" max="100">
          </div>
          
          <div class="form-group">
            <label>Temperature</label>
            <input type="number" id="temperature" name="temperature" value="0.7" min="0" max="2" step="0.1">
          </div>
          
          <div class="form-group">
            <label>Max Tokens</label>
            <input type="number" id="max-tokens" name="max_tokens" value="4000" min="1000" max="8000" step="100">
          </div>
          
          <div id="generate-alert"></div>
          
          <button type="submit" class="btn btn-primary" id="generate-btn" style="width:100%">
            Generate Article
          </button>
        </form>
      </div>

      <!-- Preview Panel -->
      <div class="panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <h2 style="margin:0">Generated Article</h2>
          <button class="btn btn-outline" onclick="toggleSidebar()" style="font-size:12px;padding:6px 12px" id="toggle-btn">
            ◀ Hide Form
          </button>
        </div>
        <div id="article-preview">
          <div class="empty-state">
            No article generated yet.<br>
            Fill in the form and click "Generate Article" to create content.
          </div>
        </div>
      </div>
    </div>

    <!-- Recent Articles -->
    <div class="panel" style="margin-top: 20px;">
      <h2>Recent Articles</h2>
      <div id="recent-articles">
        <div class="loading">
          <div class="spinner"></div>
          <div style="margin-top:10px">Loading recent articles...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Load providers
    async function loadProviders() {
      const res = await fetch('/api/providers');
      if (!res.ok) return;
      const data = await res.json();
      const select = document.getElementById('provider-id');
      // API returns array directly, not {providers: [...]}
      const providers = Array.isArray(data) ? data : (data.providers || []);
      providers.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.textContent = `${p.name} — ${p.base_url}`;
        select.appendChild(opt);
      });
    }

    // Load categories
    async function loadCategories() {
      const res = await fetch('/api/categories');
      if (!res.ok) return;
      const data = await res.json();
      const select = document.getElementById('categories');
      (data.categories || []).forEach(c => {
        if (c.enabled) {
          const opt = document.createElement('option');
          opt.value = c.id;
          opt.textContent = c.name;
          select.appendChild(opt);
        }
      });
    }

    // Load style presets
    async function loadStyles() {
      const res = await fetch('/api/social-article/styles');
      if (!res.ok) return;
      const data = await res.json();
      const select = document.getElementById('style-preset');
      (data.presets || []).forEach(s => {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = `${s.name} — ${s.description}`;
        select.appendChild(opt);
      });
      select.value = 'blog_formal'; // Default
    }

    // Load recent articles
    async function loadRecentArticles() {
      const res = await fetch('/api/social-article/list?limit=10');
      if (!res.ok) {
        document.getElementById('recent-articles').innerHTML = '<div class="empty-state">Failed to load articles</div>';
        return;
      }
      const data = await res.json();
      const container = document.getElementById('recent-articles');
      
      if (!data.articles || data.articles.length === 0) {
        container.innerHTML = '<div class="empty-state">No articles generated yet</div>';
        return;
      }
      
      container.innerHTML = data.articles.map(a => `
        <div class="article-card">
          <div class="article-title">${a.title || 'Untitled'}</div>
          <div class="article-meta">
            ${(a.metadata?.categories || ['all']).join(', ')} • 
            ${a.metadata?.source_count || 0} sources • 
            ${a.estimated_read_time || 0} min read • 
            ${new Date(a.metadata?.generated_at).toLocaleString()}
          </div>
          ${a.subtitle ? `<div style="font-size:12px;color:var(--muted);margin-bottom:8px">${a.subtitle}</div>` : ''}
          <div class="article-tags">
            ${(a.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
          </div>
          <div style="margin-top:10px">
            <button class="btn btn-outline" style="font-size:12px;padding:6px 12px" onclick="viewArticle('${a.id}')">
              View Full Article
            </button>
            <button class="btn btn-outline" style="font-size:12px;padding:6px 12px;color:var(--red);border-color:var(--red)" onclick="deleteArticle('${a.id}')">
              Delete
            </button>
          </div>
        </div>
      `).join('');
    }

    // Generate article
    document.getElementById('generate-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const btn = document.getElementById('generate-btn');
      const alert = document.getElementById('generate-alert');
      
      btn.disabled = true;
      btn.textContent = 'Generating...';
      alert.innerHTML = '<div class="alert alert-info">Generating article... This may take 30-60 seconds.</div>';
      
      const formData = new FormData(e.target);
      
      // Get selected categories
      const categoriesSelect = document.getElementById('categories');
      const selectedCategories = Array.from(categoriesSelect.selectedOptions).map(opt => opt.value);
      
      const body = {
        provider_id: formData.get('provider_id') || null,
        categories: selectedCategories.length > 0 ? selectedCategories : null,
        style_preset: formData.get('style_preset'),
        hours: parseInt(formData.get('hours')),
        min_articles: parseInt(formData.get('min_articles')),
        max_articles: parseInt(formData.get('max_articles')),
        temperature: parseFloat(formData.get('temperature')),
        max_tokens: parseInt(formData.get('max_tokens')),
        save: true,
      };
      
      try {
        const res = await fetch('/api/social-article/generate', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(body),
        });
        
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Generation failed');
        }
        
        const data = await res.json();
        alert.innerHTML = '<div class="alert alert-success">Article generated successfully!</div>';
        displayArticle(data.article);
        loadRecentArticles();
      } catch (err) {
        alert.innerHTML = `<div class="alert alert-error">Error: ${err.message}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate Article';
      }
    });

    // Display article in preview
    function displayArticle(article) {
      const preview = document.getElementById('article-preview');
      
      // Handle both old format (sections) and new format (content)
      let contentHtml = '';
      
      if (article.content) {
        // New format: continuous prose
        const formattedContent = article.content.split('\n\n').map(p => 
          `<p style="margin-bottom:16px;line-height:1.7">${p.trim()}</p>`
        ).join('');
        contentHtml = `<div style="margin-bottom:24px;font-size:14px;color:var(--text)">${formattedContent}</div>`;
      } else if (article.sections) {
        // Old format: sections (backward compatibility)
        contentHtml = article.sections.map((s, i) => `
          <div class="section-box">
            <div class="section-heading">${i + 1}. ${s.heading}</div>
            <div class="section-content">${s.content || ''}</div>
            ${s.image_prompt ? `
              <div style="font-size:11px;font-weight:600;margin-bottom:4px;color:var(--muted);margin-top:10px">Image Prompt:</div>
              <div class="image-prompt">${s.image_prompt}</div>
            ` : ''}
          </div>
        `).join('');
      }
      
      // Build image prompts section (new format)
      const imagePromptsHtml = (article.image_prompts || []).map((prompt, i) => `
        <div style="margin-bottom:12px">
          <div style="font-size:11px;font-weight:600;margin-bottom:4px;color:var(--muted)">Image ${i + 1} Prompt:</div>
          <div class="image-prompt">${prompt}</div>
        </div>
      `).join('');
      
      preview.innerHTML = `
        <div style="margin-bottom:24px">
          <h3 style="font-size:22px;font-weight:700;margin-bottom:8px;line-height:1.3">${article.title}</h3>
          ${article.subtitle ? `<p style="font-size:15px;color:var(--muted);margin-bottom:12px;font-style:italic">${article.subtitle}</p>` : ''}
          <div style="font-size:11px;color:var(--muted);padding-bottom:12px;border-bottom:1px solid var(--border)">
            ${article.metadata?.source_count || 0} sources • 
            ${article.estimated_read_time || 0} min read
          </div>
        </div>
        
        <div style="margin-bottom:24px">
          <div style="font-size:12px;font-weight:600;margin-bottom:6px;color:var(--muted)">Thumbnail Prompt:</div>
          <div class="image-prompt">${article.thumbnail_prompt || 'No thumbnail prompt generated'}</div>
        </div>
        
        ${contentHtml}
        
        ${imagePromptsHtml ? `<div style="margin-bottom:24px">${imagePromptsHtml}</div>` : ''}
        
        <div class="article-tags">
          ${(article.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
      `;
    }

    // View full article
    async function viewArticle(id) {
      const res = await fetch(`/api/social-article/${id}`);
      if (!res.ok) {
        alert('Failed to load article');
        return;
      }
      const data = await res.json();
      displayArticle(data.article);
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    // Delete article
    async function deleteArticle(id) {
      if (!confirm('Delete this article?')) return;
      
      const res = await fetch(`/api/social-article/${id}`, {method: 'DELETE'});
      if (res.ok) {
        loadRecentArticles();
      } else {
        alert('Failed to delete article');
      }
    }

    // Toggle sidebar
    function toggleSidebar() {
      const grid = document.querySelector('.grid-2');
      const btn = document.getElementById('toggle-btn');
      
      if (grid.classList.contains('collapsed')) {
        grid.classList.remove('collapsed');
        btn.textContent = '◀ Hide Form';
      } else {
        grid.classList.add('collapsed');
        btn.textContent = '▶ Show Form';
      }
    }

    // Initialize
    loadProviders();
    loadCategories();
    loadStyles();
    loadRecentArticles();
  </script>
</body>
</html>
