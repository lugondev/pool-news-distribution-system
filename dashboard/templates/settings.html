<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — News Aggregator</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3e;
      --text: #e2e8f0; --muted: #718096; --accent: #6366f1;
      --green: #10b981; --red: #ef4444; --yellow: #f59e0b;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 24px;
             display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 16px; font-weight: 600; }
    .badge { background: var(--accent); color: white; font-size: 11px; padding: 2px 8px; border-radius: 999px; }
    .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--green);
             animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .nav-links { margin-left: auto; display: flex; gap: 16px; font-size: 13px; }
    .nav-links a { color: var(--muted); text-decoration: none; padding: 4px 10px; border-radius: 6px; transition: all .15s; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); background: var(--border); }

    .container { max-width: 960px; margin: 0 auto; padding: 24px; }

    /* Tabs */
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 0; }
    .tab {
      padding: 10px 24px; font-size: 13px; font-weight: 600; cursor: pointer;
      color: var(--muted); border: 1px solid transparent; border-bottom: none;
      border-radius: 8px 8px 0 0; transition: all .15s; background: transparent;
      position: relative; bottom: -1px;
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      color: var(--text); background: var(--surface);
      border-color: var(--border); border-bottom-color: var(--surface);
    }
    .tab-indicator { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-left: 6px; }
    .tab-indicator.on { background: var(--green); }
    .tab-indicator.off { background: var(--red); }

    .tab-content { background: var(--surface); border: 1px solid var(--border); border-top: none;
                   border-radius: 0 0 8px 8px; min-height: 400px; }

    /* Panel inner */
    .panel-inner { padding: 24px; }
    .panel-inner h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .panel-inner .desc { font-size: 12px; color: var(--muted); margin-bottom: 18px; }

    .form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .form-group label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; font-weight: 600; }
    .form-group .hint { font-size: 11px; color: var(--muted); font-weight: 400; text-transform: none; letter-spacing: 0; }
    .form-group input, .form-group select, .form-group textarea {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      padding: 8px 10px; border-radius: 6px; font-size: 13px; outline: none; transition: border-color .15s;
      font-family: inherit;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

    .toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
    .toggle-label { font-size: 13px; font-weight: 500; }
    .toggle-status { font-size: 11px; font-weight: 600; }
    .toggle-on { color: var(--green); }
    .toggle-off { color: var(--red); }

    .btn { padding: 8px 18px; border-radius: 6px; font-size: 13px; font-weight: 500;
           cursor: pointer; border: none; transition: all .15s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-outline { background: transparent; color: var(--accent); border: 1.5px solid var(--accent); }
    .btn-outline:hover { background: rgba(99,102,241,0.08); }
    .btn-outline:disabled { opacity: 0.5; cursor: wait; }
    .form-actions { margin-top: 16px; display: flex; gap: 8px; }

    .alert { padding: 10px 14px; border-radius: 6px; font-size: 12px; margin-bottom: 14px; }
    .alert-success { background: rgba(16,185,129,0.12); color: var(--green); border: 1px solid rgba(16,185,129,0.25); }
    .alert-error { background: rgba(239,68,68,0.12); color: var(--red); border: 1px solid rgba(239,68,68,0.25); }

    .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    .section-title { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase;
                     letter-spacing: 0.05em; margin: 0 0 12px; }

    .log-table { width: 100%; border-collapse: collapse; }
    .log-table th { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em;
                    text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); }
    .log-table td { padding: 6px 8px; border-bottom: 1px solid var(--border); font-size: 12px; vertical-align: top; }
    .log-table tr:hover td { background: rgba(99,102,241,0.04); }
    .status-ok { color: var(--green); font-weight: 600; }
    .status-fail { color: var(--red); font-weight: 600; }
    .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; }
    .truncate { max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .url-cell { max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; }

    .payload-box { background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
                   padding: 12px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px;
                   line-height: 1.6; overflow-x: auto; color: var(--muted); }
    .payload-box .key { color: var(--accent); }
    .payload-box .str { color: var(--green); }
    .payload-box .comment { color: #4a5568; font-style: italic; }

    .empty-state { text-align: center; padding: 24px; color: var(--muted); font-size: 12px; }

    /* Sub-tabs (inside a panel) */
    .sub-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin: 0 -24px; padding: 0 24px; }
    .sub-tab {
      padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer;
      color: var(--muted); border-bottom: 2px solid transparent;
      transition: all .15s; background: transparent; border-top: none; border-left: none; border-right: none;
    }
    .sub-tab:hover { color: var(--text); }
    .sub-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .sub-tab-content { padding-top: 20px; }

    /* AI log detail */
    .log-row-detail { display: none; }
    .log-row-detail.open { display: table-row; }
    .log-detail-cell { padding: 10px 8px !important; background: var(--bg) !important; }
    .log-detail-inner { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .log-detail-block { font-size: 11px; line-height: 1.5; }
    .log-detail-block .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase;
                              letter-spacing: .04em; font-weight: 600; margin-bottom: 3px; }
    .log-detail-block .val { color: var(--text); }
    .log-detail-block .summary-text { color: var(--muted); border-left: 2px solid var(--border);
                                       padding-left: 8px; margin-top: 4px; line-height: 1.5; }
    .log-row-toggle { cursor: pointer; }
    .log-row-toggle:hover td { background: rgba(99,102,241,0.06) !important; }
    .log-expand { color: var(--muted); font-size: 10px; transition: transform .15s; display: inline-block; }
    .log-expand.open { transform: rotate(90deg); }
    .log-source { font-size: 10px; color: var(--accent); }
    .log-lang { font-size: 9px; background: var(--border); padding: 1px 5px; border-radius: 3px; color: var(--muted); }
    .log-status-done { color: var(--green); font-size: 10px; font-weight: 600; }
    .log-status-pending { color: var(--yellow); font-size: 10px; font-weight: 600; }

    /* Webhook cards */
    .wh-card { background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
               padding: 12px 14px; margin-bottom: 8px; transition: border-color .15s; }
    .wh-card:hover { border-color: rgba(99,102,241,0.3); }
    .wh-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .wh-info { display: flex; align-items: center; gap: 8px; }
    .wh-name { font-size: 13px; font-weight: 600; }
    .wh-id { font-size: 10px; color: var(--muted); }
    .wh-actions { display: flex; gap: 4px; }
    .wh-url { font-size: 11px; font-family: 'SF Mono', 'Fira Code', monospace; color: var(--accent);
              overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 4px; }
    .wh-meta { font-size: 10px; color: var(--muted); }
    .wh-edit-form { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
    .wh-add { background: var(--bg); border: 1px dashed var(--border); border-radius: 6px; padding: 16px; margin-top: 12px; }

    .btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 4px; }
    .btn-test { background: transparent; border: 1px solid var(--yellow); color: var(--yellow); cursor: pointer; transition: all .15s; }
    .btn-test:hover { background: var(--yellow); color: var(--bg); }
    .btn-test:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-toggle { background: transparent; border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all .15s; }
    .btn-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .btn-edit { background: transparent; border: 1px solid var(--accent); color: var(--accent); cursor: pointer; transition: all .15s; }
    .btn-edit:hover { background: var(--accent); color: white; }
    .btn-danger { background: transparent; border: 1px solid var(--red); color: var(--red); cursor: pointer; transition: all .15s; }
    .btn-danger:hover { background: var(--red); color: white; }
    .btn-save { background: var(--green); border: 1px solid var(--green); color: white; cursor: pointer; transition: all .15s; }
    .btn-save:hover { opacity: 0.85; }
    .btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all .15s; }
    .btn-cancel:hover { border-color: var(--text); color: var(--text); }
    
    .test-result { transition: all .3s; }

    /* Log pagination */
    .log-pagination { display: flex; align-items: center; justify-content: space-between; margin-top: 12px;
                      padding-top: 10px; border-top: 1px solid var(--border); }
    .log-pagination .info { font-size: 11px; color: var(--muted); }
    .log-pagination .pages { display: flex; gap: 4px; }
    .page-btn {
      background: var(--bg); border: 1px solid var(--border); color: var(--text);
      padding: 4px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; transition: all .15s;
    }
    .page-btn:hover { border-color: var(--accent); color: var(--accent); }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .page-btn:disabled:hover { border-color: var(--border); color: var(--text); }
    .page-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  </style>
</head>
<body>
  <header>
    <div class="pulse"></div>
    <h1>News Aggregator</h1>
    <span class="badge">LIVE</span>
    <nav class="nav-links">
      <a href="/">Feed</a>
      <a href="/pipeline">Pipeline</a>
      <a href="/intelligence">Intelligence</a>
      <a href="/newsletter">Newsletter</a>
      <a href="/debates">Debates</a>
      <a href="/sources">Sources</a>
      <a href="/settings" class="active">Settings</a>
      <a href="/logs">Logs</a>
    </nav>
  </header>

  <div class="container">
    <div class="tabs" id="settings-tabs">
      <button class="tab active" id="tab-general"
              onclick="switchTab('general')">
        General
        <span class="tab-indicator" id="tab-general-dot"></span>
      </button>
      <button class="tab" id="tab-ai"
              onclick="switchTab('ai')">
        AI Summarization
        <span class="tab-indicator" id="tab-ai-dot"></span>
      </button>
      <button class="tab" id="tab-webhook"
              onclick="switchTab('webhook')">
        Webhook Delivery
        <span class="tab-indicator" id="tab-webhook-dot"></span>
      </button>
      <button class="tab" id="tab-telegram"
              onclick="switchTab('telegram')">
        Telegram
        <span class="tab-indicator" id="tab-telegram-dot"></span>
      </button>
    </div>

    <div class="tab-content">
      <div id="tab-panel-general"
           hx-get="/partials/settings-general"
           hx-trigger="load once"
           hx-swap="innerHTML">
        <div class="panel-inner"><p style="color:var(--muted);font-size:12px">Loading general settings...</p></div>
      </div>

      <div id="tab-panel-ai" style="display:none"
           hx-get="/partials/settings-ai"
           hx-trigger="revealed once"
           hx-swap="innerHTML">
        <div class="panel-inner"><p style="color:var(--muted);font-size:12px">Loading AI settings...</p></div>
      </div>

      <div id="tab-panel-webhook" style="display:none"
           hx-get="/partials/settings-webhook"
           hx-trigger="revealed once"
           hx-swap="innerHTML">
        <div class="panel-inner"><p style="color:var(--muted);font-size:12px">Loading webhook settings...</p></div>
      </div>

      <div id="tab-panel-telegram" style="display:none"
           hx-get="/partials/settings-telegram"
           hx-trigger="revealed once"
           hx-swap="innerHTML">
        <div class="panel-inner"><p style="color:var(--muted);font-size:12px">Loading Telegram settings...</p></div>
      </div>
    </div>
  </div>

  <script>
    var tabNames = ['general', 'ai', 'webhook', 'telegram'];
    function switchTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      tabNames.forEach(function(t) {
        var panel = document.getElementById('tab-panel-' + t);
        panel.style.display = t === name ? '' : 'none';
      });
      localStorage.setItem('settings_tab', name);
    }
    // Restore last active tab on load
    (function() {
      var saved = localStorage.getItem('settings_tab');
      if (saved && tabNames.indexOf(saved) !== -1 && saved !== 'general') {
        document.getElementById('tab-general').classList.remove('active');
        document.getElementById('tab-panel-general').style.display = 'none';
        document.getElementById('tab-' + saved).classList.add('active');
        var panel = document.getElementById('tab-panel-' + saved);
        panel.style.display = '';
        htmx.trigger(panel, 'revealed');
      }
    })();
  </script>
</body>
</html>
