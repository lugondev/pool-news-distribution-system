<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG — News Aggregator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3e;
      --text: #e2e8f0; --muted: #718096; --accent: #6366f1;
      --green: #10b981; --red: #ef4444; --yellow: #f59e0b; --teal: #14b8a6;
      --purple: #a855f7;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; overflow-x: hidden; }
    a { color: var(--accent); text-decoration: none; }


    /* ── Neural canvas background ── */
    #neuron-canvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; opacity: 0.35;
    }

    /* ── Layout ── */
    .page { padding: 24px; max-width: 860px; margin: 0 auto; position: relative; z-index: 1; }

    /* ── Status bar ── */
    .status-bar {
      display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 16px; font-size: 13px;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.ok  { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
    .status-dot.err { background: var(--red); }
    .status-dot.loading { background: var(--muted); animation: pulse 1s infinite; }
    .status-label { font-weight: 600; }
    .status-detail { color: var(--muted); margin-left: auto; font-size: 12px; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface);
            border: 1px solid var(--border); border-radius: 10px; padding: 4px; }
    .tab-btn {
      flex: 1; padding: 8px 16px; border: none; border-radius: 7px; cursor: pointer;
      font-size: 13px; font-weight: 500; color: var(--muted); background: transparent;
      transition: all .15s;
    }
    .tab-btn.active { background: var(--accent); color: #fff; }
    .tab-btn:hover:not(.active) { color: var(--text); background: var(--border); }

    /* ── Search form ── */
    .search-wrap { position: relative; margin-bottom: 16px; }
    .search-input {
      width: 100%; padding: 12px 48px 12px 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 14px;
      outline: none; transition: border-color .15s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }
    .search-btn {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: var(--accent); border: none; color: #fff; border-radius: 6px;
      padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    .search-btn:hover { background: #4f46e5; }
    .search-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

    .filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-select {
      padding: 6px 10px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text); font-size: 12px; outline: none; cursor: pointer;
    }
    .alpha-label { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; margin-left: auto; }
    .alpha-label input[type=range] { width: 80px; accent-color: var(--accent); }

    /* ── Q&A form ── */
    .qa-textarea {
      width: 100%; padding: 12px 16px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 10px; color: var(--text);
      font-size: 14px; font-family: inherit; resize: vertical; min-height: 80px;
      outline: none; transition: border-color .15s; margin-bottom: 10px;
    }
    .qa-textarea:focus { border-color: var(--accent); }
    .qa-row { display: flex; gap: 8px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
    .qa-btn {
      background: var(--accent); border: none; color: #fff; border-radius: 8px;
      padding: 9px 20px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s;
    }
    .qa-btn:hover { background: #4f46e5; }
    .qa-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

    /* ── Answer block ── */
    .answer-block {
      background: rgba(99,102,241,0.06); border-left: 3px solid var(--accent);
      border-radius: 0 10px 10px 0; padding: 16px 18px; margin-bottom: 16px;
      font-size: 14px; line-height: 1.8; color: #cbd5e1;
    }
    .answer-label { font-size: 10px; font-weight: 700; color: var(--accent);
                    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }

    /* ── Results ── */
    .results-header { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
    .result-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px; margin-bottom: 10px;
      transition: border-color .15s; position: relative; overflow: hidden;
    }
    .result-card:hover { border-color: rgba(99,102,241,0.4); }
    .result-card.highlight { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(99,102,241,0.2); }

    /* Score bar along left edge */
    .score-edge {
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      background: var(--accent); opacity: 0.6; border-radius: 10px 0 0 10px;
    }

    .result-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
    .result-source { font-size: 11px; font-weight: 600; color: var(--accent); }
    .result-date   { font-size: 11px; color: var(--muted); }
    .result-score  { font-size: 11px; color: var(--teal); margin-left: auto; font-weight: 600; }
    .result-title  { font-size: 14px; font-weight: 600; line-height: 1.4; margin-bottom: 6px; }
    .result-title a { color: var(--text); }
    .result-title a:hover { color: var(--accent); }
    .result-summary { font-size: 13px; color: var(--muted); line-height: 1.6; }
    .result-entities { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
    .entity-chip { font-size: 11px; padding: 2px 7px; border-radius: 4px;
                   background: var(--border); color: var(--muted); }

    /* ── Similarity score bar (visual) ── */
    .score-bar-wrap { margin-top: 8px; height: 3px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .score-bar { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--teal)); transition: width 0.6s ease; }

    /* ── Empty / loading ── */
    .state-box { text-align: center; padding: 48px 24px; color: var(--muted); }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent);
               border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Neuron node pop animation ── */
    @keyframes nodeAppear { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .result-card { animation: nodeAppear 0.25s ease forwards; }
    .result-card:nth-child(2) { animation-delay: .05s; }
    .result-card:nth-child(3) { animation-delay: .10s; }
    .result-card:nth-child(4) { animation-delay: .15s; }
    .result-card:nth-child(5) { animation-delay: .20s; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>

<canvas id="neuron-canvas"></canvas>

{% include 'partials/header.html' %}

<div class="page">

  <!-- Status -->
  <div class="status-bar" id="status-bar">
    <div class="status-dot loading" id="status-dot"></div>
    <span class="status-label" id="status-label">Checking vector store…</span>
    <span class="status-detail" id="status-detail"></span>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('search', this)">⚡ Semantic Search</button>
    <button class="tab-btn" onclick="switchTab('qa', this)">🧠 Q&A</button>
  </div>

  <!-- Search tab -->
  <div class="tab-panel active" id="tab-search">
    <div class="search-wrap">
      <input id="search-input" class="search-input" type="text"
             placeholder="Search by meaning, not just keywords…"
             onkeydown="if(event.key==='Enter') runSearch()">
      <button class="search-btn" id="search-btn" onclick="runSearch()">Search</button>
    </div>
    <div class="filter-row">
      <select class="filter-select" id="search-cat">
        <option value="">All categories</option>
      </select>
      <label class="alpha-label">
        Vector weight
        <input type="range" id="alpha-slider" min="0" max="1" step="0.05" value="0.75"
               oninput="document.getElementById('alpha-val').textContent=this.value">
        <span id="alpha-val">0.75</span>
      </label>
    </div>
    <div id="search-results"></div>
  </div>

  <!-- Q&A tab -->
  <div class="tab-panel" id="tab-qa">
    <textarea id="qa-input" class="qa-textarea"
              placeholder="Ask a question about recent news…&#10;e.g. What is happening with AI regulation in the EU?"
              onkeydown="if(event.ctrlKey&&event.key==='Enter') runAsk()"></textarea>
    <div class="qa-row">
      <select class="filter-select" id="qa-cat">
        <option value="">All categories</option>
      </select>
      <select class="filter-select" id="qa-lang">
        <option value="en">English</option>
        <option value="vi">Tiếng Việt</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
        <option value="zh">中文</option>
        <option value="fr">Français</option>
        <option value="es">Español</option>
        <option value="de">Deutsch</option>
        <option value="ar">العربية</option>
      </select>
      <button class="qa-btn" id="qa-btn" onclick="runAsk()">Ask  ⌘↵</button>
    </div>
    <div id="qa-results"></div>
  </div>

</div>

<script>
// ── Neural background canvas ──────────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('neuron-canvas');
  const ctx = canvas.getContext('2d');
  let nodes = [], W, H;
  const NODE_COUNT = 55, MAX_DIST = 150;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function rand(a, b) { return a + Math.random() * (b - a); }

  for (let i = 0; i < NODE_COUNT; i++) {
    nodes.push({
      x: rand(0, W), y: rand(0, H),
      vx: rand(-0.25, 0.25), vy: rand(-0.25, 0.25),
      r: rand(1.5, 3.5),
      glow: false,
      glowIntensity: 0,
    });
  }

  // Expose so search can highlight nodes
  window._neuronNodes = nodes;
  window._neuronHighlight = function(count) {
    nodes.forEach((n, i) => { n.glow = i < count; n.glowIntensity = i < count ? 1 : 0; });
  };

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Draw edges
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const dx = nodes[i].x - nodes[j].x;
        const dy = nodes[i].y - nodes[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < MAX_DIST) {
          const alpha = (1 - dist / MAX_DIST) * 0.18;
          const bothGlow = nodes[i].glow && nodes[j].glow;
          ctx.strokeStyle = bothGlow
            ? `rgba(99,102,241,${alpha * 4})`
            : `rgba(99,102,241,${alpha})`;
          ctx.lineWidth = bothGlow ? 1 : 0.5;
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.stroke();
        }
      }
    }

    // Draw nodes
    nodes.forEach(n => {
      if (n.glow) {
        ctx.shadowBlur = 12 * n.glowIntensity;
        ctx.shadowColor = '#6366f1';
        ctx.fillStyle = `rgba(99,102,241,${0.9 * n.glowIntensity})`;
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r * 1.8, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        n.glowIntensity = Math.max(0.3, n.glowIntensity * 0.995);
      } else {
        ctx.fillStyle = 'rgba(99,102,241,0.35)';
        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
        ctx.fill();
      }

      n.x += n.vx; n.y += n.vy;
      if (n.x < 0 || n.x > W) n.vx *= -1;
      if (n.y < 0 || n.y > H) n.vy *= -1;
    });

    requestAnimationFrame(draw);
  }
  draw();
})();


// ── Status check ─────────────────────────────────────────────────────────────
async function checkStatus() {
  try {
    const r = await fetch('/api/rag/status');
    const d = await r.json();
    const dot   = document.getElementById('status-dot');
    const label = document.getElementById('status-label');
    const detail = document.getElementById('status-detail');
    if (d.weaviate_available) {
      dot.className = 'status-dot ok';
      label.textContent = 'Vector store connected';
      detail.textContent = d.indexed_articles != null
        ? `${d.indexed_articles.toLocaleString()} articles indexed`
        : '';
    } else {
      dot.className = 'status-dot err';
      label.textContent = 'Weaviate unavailable';
      detail.textContent = 'Start Weaviate on localhost:8080';
    }
  } catch {
    document.getElementById('status-dot').className = 'status-dot err';
    document.getElementById('status-label').textContent = 'Status check failed';
  }
}
checkStatus();


// ── Category loader ───────────────────────────────────────────────────────────
async function loadCategories() {
  try {
    const r = await fetch('/api/categories');
    const data = await r.json();
    const cats = data.categories || [];
    ['search-cat', 'qa-cat'].forEach(id => {
      const sel = document.getElementById(id);
      cats.forEach(c => {
        if (!c.enabled) return;
        const opt = document.createElement('option');
        opt.value = c.id; opt.textContent = c.label || c.id;
        sel.appendChild(opt);
      });
    });
  } catch {}
}
loadCategories();


// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}


// ── Semantic Search ───────────────────────────────────────────────────────────
async function runSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  const cat   = document.getElementById('search-cat').value;
  const alpha = document.getElementById('alpha-slider').value;
  const btn   = document.getElementById('search-btn');
  const box   = document.getElementById('search-results');

  btn.disabled = true;
  box.innerHTML = '<div class="state-box"><div class="spinner"></div>Searching…</div>';
  window._neuronHighlight(0);

  try {
    const params = new URLSearchParams({ q, limit: 10, alpha });
    if (cat) params.set('category', cat);
    const r = await fetch('/api/rag/search?' + params);
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail || r.statusText); }
    const d = await r.json();

    if (!d.results || d.results.length === 0) {
      box.innerHTML = '<div class="state-box">No results found. Try a different query.</div>';
      return;
    }

    window._neuronHighlight(d.results.length);

    box.innerHTML = `<div class="results-header">${d.count} result${d.count !== 1 ? 's' : ''}</div>`
      + d.results.map(buildResultCard).join('');

  } catch (err) {
    box.innerHTML = `<div class="state-box" style="color:var(--red)">✗ ${escHtml(err.message)}</div>`;
  } finally {
    btn.disabled = false;
  }
}


// ── Q&A ───────────────────────────────────────────────────────────────────────
async function runAsk() {
  const q    = document.getElementById('qa-input').value.trim();
  if (!q) return;
  const cat  = document.getElementById('qa-cat').value;
  const lang = document.getElementById('qa-lang').value;
  const btn  = document.getElementById('qa-btn');
  const box  = document.getElementById('qa-results');

  btn.disabled = true;
  box.innerHTML = '<div class="state-box"><div class="spinner"></div>Thinking…</div>';
  window._neuronHighlight(0);

  try {
    const r = await fetch('/api/rag/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, lang, limit: 6, category: cat || null, alpha: 0.75 }),
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail || r.statusText); }
    const d = await r.json();

    window._neuronHighlight(d.retrieved);

    box.innerHTML = `
      <div class="answer-block">
        <div class="answer-label">Answer · ${d.retrieved} source${d.retrieved !== 1 ? 's' : ''} retrieved</div>
        ${escHtml(d.answer).replace(/\n/g, '<br>')}
      </div>
      ${d.sources.length ? '<div class="results-header">Sources</div>' + d.sources.map(buildSourceCard).join('') : ''}
    `;

  } catch (err) {
    box.innerHTML = `<div class="state-box" style="color:var(--red)">✗ ${escHtml(err.message)}</div>`;
  } finally {
    btn.disabled = false;
  }
}


// ── Card builders ─────────────────────────────────────────────────────────────
function buildResultCard(a) {
  const score = a._score != null ? a._score : a._distance;
  const scorePct = score != null ? Math.min(100, Math.round(score * 100)) : null;
  const date = (a.published_at || '').slice(0, 10);
  const url  = a.url && !a.url.startsWith('#') ? a.url : null;
  let entities = [];
  try { entities = JSON.parse(a.entities || '[]'); } catch {}
  if (!Array.isArray(entities)) entities = [];

  return `
    <div class="result-card">
      <div class="score-edge" style="opacity:${0.3 + (scorePct||50)/100*0.7}"></div>
      <div class="result-meta">
        <span class="result-source">${escHtml(a.source_name || '')}</span>
        ${date ? `<span class="result-date">${date}</span>` : ''}
        ${scorePct != null ? `<span class="result-score">score ${(score).toFixed(3)}</span>` : ''}
      </div>
      <div class="result-title">
        ${url ? `<a href="${escHtml(url)}" target="_blank">${escHtml(a.title || '')}</a>`
               : escHtml(a.title || '')}
      </div>
      ${a.summary_en ? `<div class="result-summary">${escHtml(a.summary_en.slice(0, 200))}…</div>` : ''}
      ${entities.length ? `
        <div class="result-entities">
          ${entities.slice(0, 6).map(e => `<span class="entity-chip">${escHtml(typeof e==='string'?e:e.name||'')}</span>`).join('')}
        </div>` : ''}
      ${scorePct != null ? `
        <div class="score-bar-wrap">
          <div class="score-bar" style="width:${scorePct}%"></div>
        </div>` : ''}
    </div>`;
}

function buildSourceCard(s) {
  const url = s.url && !s.url.startsWith('#') ? s.url : null;
  return `
    <div class="result-card">
      <div class="score-edge"></div>
      <div class="result-meta">
        <span class="result-source">${escHtml(s.source_name || '')}</span>
        <span class="result-date">${(s.published_at || '').slice(0, 10)}</span>
        ${s.score != null ? `<span class="result-score">${Number(s.score).toFixed(3)}</span>` : ''}
      </div>
      <div class="result-title">
        ${url ? `<a href="${escHtml(url)}" target="_blank">${escHtml(s.title || '')}</a>`
               : escHtml(s.title || '')}
      </div>
    </div>`;
}

function escHtml(s) {
  return String(s || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
</script>
</body>
</html>
